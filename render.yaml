services:
  # ════════════════════════════════════════════════════════════
  # BACKEND — FastAPI, served by uvicorn
  # ════════════════════════════════════════════════════════════
  - type: web
    name: crownd-backend
    runtime: python
    rootDir: backend
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # ── Database (Supabase-hosted Postgres, not a Render-managed DB) ──
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

      # ── Auth / JWT ──
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"

      # ── Razorpay ──
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

      # ── Instagram (mock mode — no real OAuth) ──
      - key: INSTAGRAM_ACCESS_TOKEN
        value: mock

      # ── Python runtime ──
      - key: PYTHON_VERSION
        value: "3.12.7"

  # ════════════════════════════════════════════════════════════
  # FRONTEND — static HTML/CSS/JS, no build step
  # ════════════════════════════════════════════════════════════
  - type: web
    name: crownd-frontend
    runtime: static
    rootDir: frontend
    plan: free
    region: oregon
    branch: main
    buildCommand: ""
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
